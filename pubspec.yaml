name: portfolio
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  flutter_web_plugins:
    sdk: flutter
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  animated_background: ^2.0.0
  flutter_svg: ^1.0.3
  sliver_tools: ^0.2.5
  get: ^4.6.1
  dio: ^4.0.6
  font_awesome_flutter: ^10.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^1.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icon/
    - assets/other/
    - assets/project/
    - assets/screenshot/
    - assets/screenshot/bisaberbagi/
    - assets/screenshot/during/
    - assets/screenshot/mumtaaz/
    - assets/screenshot/alita/
    - assets/screenshot/nyarios/
    - assets/screenshot/hallaw/
    - assets/screenshot/agtran/

  fonts:
    - family: Roboto Bold
      fonts:
        - asset: fonts/Roboto-Bold.ttf
    - family: Montserrat Regular
      fonts:
        - asset: fonts/Montserrat-Regular.ttf
